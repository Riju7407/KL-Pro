version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: kl-services-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: kl-services
    volumes:
      - mongo_data:/data/db
    networks:
      - kl-network

  backend:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: kl-services-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/kl-services
      JWT_SECRET: kl_services_secret_key_2024
      PORT: 5000
      NODE_ENV: development
    depends_on:
      - mongodb
    volumes:
      - ./Server:/app
      - /app/node_modules
    networks:
      - kl-network

  frontend:
    build:
      context: ./Client
      dockerfile: Dockerfile
    container_name: kl-services-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./Client:/app
      - /app/node_modules
    networks:
      - kl-network

volumes:
  mongo_data:

networks:
  kl-network:
    driver: bridge
